  try {
    const entry = {
      t: Date.now(),
      msg,
      data
    };

    localStorage.setItem(DEBUG_LOG_KEY, JSON.stringify(arr));
  } catch (_) {}
};

// Cookie helpers (terzo backup)
const setCookie = (name, value, days) => {
  try {
    if (days === undefined) days = 30;
    const d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/;SameSite=Lax";
  } catch (_) {}
};
const getCookie = name => {
  try {
    const m = document.cookie.match(new RegExp("(^|;)\\s*" + name + "=([^;]+)"));
    return m ? decodeURIComponent(m[2]) : null;
  } catch (_) {
    return null;
  }
};
const delCookie = name => {
  try {
    document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
  } catch (_) {}
};

// Triple-source read: localStorage > sessionStorage > cookie
const readProfiloCache = () => {
  let raw = null,
    source = null;
  try {
    raw = localStorage.getItem(PROFILO_CACHE_KEY);
    if (raw && raw !== "null") source = "localStorage";
  } catch (_) {}
  if (!source) {
    try {
      raw = sessionStorage.getItem(PROFILO_CACHE_KEY);
      if (raw && raw !== "null") source = "sessionStorage";
    } catch (_) {}
  }
  if (!source) {
    const c = getCookie("parkly_profilo");
    if (c) {
      raw = c;
      source = "cookie";
    }
  }
  if (!source || !raw) {
    debugLog("readCache: NULL");
    return null;
  }
  try {
    const parsed = JSON.parse(raw);
    debugLog("readCache: OK from " + source, {
      id: parsed?.id
    });
    return parsed;
  } catch (e) {
    debugLog("readCache: parse FAIL", e.message);
    return null;
  }
};

// Write tutti i 3 storage
const writeProfiloCache = val => {
  if (val) {
    const json = JSON.stringify(val);
    try {
      localStorage.setItem(PROFILO_CACHE_KEY, json);
    } catch (_) {}
    try {
      sessionStorage.setItem(PROFILO_CACHE_KEY, json);
    } catch (_) {}
    setCookie("parkly_profilo", json);
    debugLog("writeCache: SET", {
      id: val.id
    });
  } else {
    try {
      localStorage.removeItem(PROFILO_CACHE_KEY);
    } catch (_) {}
    try {
      sessionStorage.removeItem(PROFILO_CACHE_KEY);
    } catch (_) {}
    delCookie("parkly_profilo");
    debugLog("writeCache: CLEAR");
  }
};

/* ── MINI MAPPA COMUNE ──────────────────────────────── */
const MiniMappaComune = ({
  parchi,
  giochi,
  onNav
}) => {
  const containerRef = useRef(null);
  const mapRef = useRef(null);

  // Memoizza la lista di parchi geolocalizzati per evitare re-render infiniti
  const parchiConCoord = useMemo(() => parchi.filter(p => p.lat != null && p.lng != null), [parchi]);

  // Chiave stabile basata su id+coord (cambia solo se cambiano davvero i dati)
  const dataKey = useMemo(() => parchiConCoord.map(p => p.id + ":" + p.lat + "," + p.lng + ":" + p.stato).join("|"), [parchiConCoord]);
  useEffect(() => {
    console.log("[MiniMappa] init effect, parchi:", parchiConCoord.length);
    if (!containerRef.current) {
      console.warn("[MiniMappa] container null");
      return;
    }
    if (parchiConCoord.length === 0) return;
    if (typeof L === "undefined") {
      console.error("[MiniMappa] Leaflet non caricato");
      return;
    }

    // Distrugge istanza precedente se esiste (cambio comune o aggiornamento parchi)
    if (mapRef.current) {
      try {
        mapRef.current.remove();
      } catch (_) {}
      mapRef.current = null;
    }

    // Inizializza la mappa con un piccolo delay per assicurarsi che il container abbia dimensioni
    const initMap = () => {
      if (!containerRef.current) return;
      const map = L.map(containerRef.current, {
        zoomControl: true,
        attributionControl: false,
        scrollWheelZoom: false,
        dragging: true,
        tap: true
      }).setView([parchiConCoord[0].lat, parchiConCoord[0].lng], 13);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19
      }).addTo(map);
      L.control.attribution({
        prefix: false
      }).addAttribution("© OSM").addTo(map);
      mapRef.current = map;
      parchiConCoord.forEach(p => {
        const ng = giochi.filter(g => g.parco_id === p.id).length;
        const color = p.stato === "fail" ? T.failColor : p.stato === "warning" ? T.warnColor : T.passColor;
        const icon = L.divIcon({
          className: "",
          html: `<div style="width:30px;height:30px;background:${color};border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;">❀</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15]
        });
        const marker = L.marker([p.lat, p.lng], {
          icon
        }).addTo(map);
        marker.bindPopup(`
          <div style="font-family:'Outfit',sans-serif;min-width:160px;">
            <div style="font-weight:700;font-size:13px;color:${T.text};">${p.nome}</div>
            <div style="font-size:11px;color:${T.textMuted};margin:3px 0 6px;">${ng} giochi</div>
            <button id="mini-go-${p.id}" style="background:${T.primary};color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;width:100%;font-family:'Outfit',sans-serif;">Apri parco →</button>
          </div>`);
        marker.on("popupopen", () => {
          const btn = document.getElementById(`mini-go-${p.id}`);
          if (btn) btn.onclick = () => onNav("parco", p);
        });
      });

      // Auto-fit ai marker, oppure singolo punto
      if (parchiConCoord.length > 1) {
        const group = L.featureGroup(parchiConCoord.map(p => L.marker([p.lat, p.lng])));
        try {
          map.fitBounds(group.getBounds().pad(0.3), {
            animate: false,
            maxZoom: 14
          });
